name: Deploy to cPanel

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  web-deploy:
    name: Deploy to cPanel
    runs-on: ubuntu-latest

    steps:
      - name: Get latest code
        uses: actions/checkout@v4

      - name: Check DNS and IP
        run: |
          echo "Testing DNS and IP connection targets"
          nslookup ftp.greenvaluegroup.com || true
          nslookup portfolio.greenvaluegroup.com || true
          echo "Using direct server IP: 91.204.209.39"

      - name: Sync files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: 91.204.209.39
          username: greenvbw@portfolio.greenvaluegroup.com
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          server-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/.github*/**
            **/node_modules/**
            README.md
            PUBLISH_CHECKLIST.md
            EDIT_PROJECTS.md
            SHARE_MESSAGES.md
